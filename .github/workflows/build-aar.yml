name: Build AAR

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-28" \
            "build-tools;28.0.3" \
            "ndk;20.1.5948944"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/20.1.5948944" >> local.properties

      - name: Build library artifacts
        run: |
          chmod +x gradlew
          ./gradlew \
            :annotation:jar \
            :hooklib:assembleRelease \
            :xposedcompat:assembleRelease \
            :nativehook:assembleRelease \
            --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandhook-artifacts
          path: |
            annotation/build/libs/annotation.jar
            hooklib/build/outputs/aar/hooklib-release.aar
            xposedcompat/build/outputs/aar/xposedcompat-release.aar
            nativehook/build/outputs/aar/nativehook-release.aar
          if-no-files-found: error
