name: Build AAR

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up JDK 17 for Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-28" \
            "build-tools;28.0.3" \
            "ndk;20.1.5948944"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/20.1.5948944" >> local.properties

      - name: Set up JDK 8 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: gradle

      - name: Build library artifacts
        run: |
          chmod +x gradlew
          ./gradlew \
            :annotation:jar \
            :hooklib:assembleRelease \
            :xposedcompat:assembleRelease \
            :nativehook:assembleRelease \
            --stacktrace

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        run: |
          mkdir -p release-assets
          cp annotation/build/libs/annotation.jar release-assets/annotation.jar
          cp hooklib/build/outputs/aar/hooklib-release.aar release-assets/hooklib.aar
          cp xposedcompat/build/outputs/aar/xposedcompat-release.aar release-assets/xposedcompat.aar
          cp nativehook/build/outputs/aar/nativehook-release.aar release-assets/nativehook.aar

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: sandhook-artifacts
          path: |
            annotation/build/libs/annotation.jar
            hooklib/build/outputs/aar/hooklib-release.aar
            xposedcompat/build/outputs/aar/xposedcompat-release.aar
            nativehook/build/outputs/aar/nativehook-release.aar
          if-no-files-found: error
